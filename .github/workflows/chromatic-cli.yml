name: "Chromatic with CLI"

on: push

jobs:
  vitest:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest tests
        run: npx vitest run --project chromatic
        env:
          HOME: /root
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-cli
          path: .vitest/chromatic
          retention-days: 1
  chromatic:
    name: Run Chromatic
    needs: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
      - name: Install dependencies
        run: npm ci
      - name: Download Vitest test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-cli
          path: .vitest/chromatic
      # - name: Display Vitest test results CLI
      #   run: |
      #     echo "Vitest Test Results CLI:"
      #     ls -la
      #     ls -la .vitest*
      #     echo "Contents of .vitest/ directory:"
      #     cd .vitest
      #     tree
      - name: Run Chromatic
        ## Moves to CLI command for testing
        run: npx chromatic --vitest --project-token ${{ secrets.CHROMATIC_PROJECT_TOKEN }} --exit-zero-on-changes
